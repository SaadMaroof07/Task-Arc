name: Taskarc CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Code lo GitHub se
      uses: actions/checkout@v3

    - name: Docker Hub mein login karo
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Docker image banao aur push karo
      uses: docker/build-push-action@v5
      with:
        context: ./TaskArc/Backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/taskarc-backend:latest